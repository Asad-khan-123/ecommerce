<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&amp;family=Bebas+Neue&amp;family=Poppins:wght@200;700;900&amp;display=swap');
      .logo-bold {
        font-family: 'Oswald', 'Bebas Neue', 'Impact', 'Arial Narrow', sans-serif;
        font-weight: 900;
        fill: currentColor;
        font-stretch: condensed;
      }
      .logo-thin {
        font-family: 'Poppins', 'Helvetica Neue', 'Arial', sans-serif;
        font-weight: 200;
        fill: currentColor;
        letter-spacing: 0.05em;
      }
    </style>
  </defs>
  
  <!-- I AM -->
  <text x="15" y="120" font-size="115" class="logo-bold">I</text>
  <text x="485" y="120" font-size="115" class="logo-bold" text-anchor="end">AM</text>
  
  <!-- TROUBLE -->
  <text x="12" y="275" font-size="120" class="logo-bold" letter-spacing="-0.03em">TROUBLE</text>
  
  <!-- BY KC -->
  <text x="480" y="440" font-size="110" class="logo-thin" text-anchor="end">BY KC</text>
</svg>
