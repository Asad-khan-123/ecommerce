<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EARTHLYF Navbar Preview</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
    }

    .earthlyf-header {
      background: #F9F7F3;
      border-bottom: 1px solid #EAEAEA;
      padding: 18px 0;
      position: sticky;
      top: 0;
    }

    .header-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
    }

    .header-nav-left ul {
      display: flex;
      gap: 32px;
      list-style: none;
    }

    .header-nav-left a {
      text-decoration: none;
      color: #2A2A2A;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: opacity 0.2s ease;
    }

    .header-nav-left a:hover {
      opacity: 0.6;
    }

    .header-logo {
      text-align: center;
    }

    .header-logo img {
      height: 40px;
      width: auto;
    }

    .header-icons {
      display: flex;
      justify-content: flex-end;
      gap: 24px;
      align-items: center;
    }

    .header-icons a {
      color: #2A2A2A;
      display: flex;
    }

    .header-icons svg {
      width: 20px;
      height: 20px;
      stroke-width: 1.5;
    }

    /* Dummy content below */
    .hero {
      height: 600px;
      background: url('https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?w=1600') center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .hero h1 {
      color: white;
      font-size: 32px;
      letter-spacing: 3px;
      font-weight: 300;
    }

    @media (max-width: 990px) {
      .header-nav-left {
        display: none;
      }
      .header-container {
        padding: 0 20px;
      }
    }
  </style>
</head>
<body>

<header class="earthlyf-header">
  <div class="header-container">
    
    <!-- Left Menu -->
    <nav class="header-nav-left">
      <ul>
        <li><a href="#">HOME</a></li>
        <li><a href="#">ALL PRODUCTS</a></li>
        <li><a href="#">MEET THE FORMULATOR</a></li>
        <li><a href="#">INGREDIENTS GLOSSARY</a></li>
        <li><a href="#">THE CLINICAL FAQ</a></li>
      </ul>
    </nav>

    <!-- Center Logo -->
    <div class="header-logo">
      <a href="#">
        <img src="https://cdn.shopify.com/s/files/1/0726/2167/3360/files/Earthlyf_Logo.png" alt="EARTHLYF">
      </a>
    </div>

    <!-- Right Icons -->
    <div class="header-icons">
      <!-- Search Icon -->
      <a href="#" aria-label="Search">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607Z" />
        </svg>
      </a>
      
      <!-- Account Icon -->
      <a href="#" aria-label="Account">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
        </svg>
      </a>
      
      <!-- Cart Icon -->
      <a href="#" aria-label="Cart">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
        </svg>
      </a>
    </div>

  </div>
</header>

<!-- Dummy Hero Section to see how it looks -->
<div class="hero">
  <h1>WHERE SKINCARE BEGINS</h1>
</div>

</body>
</html>
